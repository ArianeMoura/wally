services:
  db:
    image: postgres:16
    container_name: wally-db
    restart: always
    environment:
      POSTGRES_USER: wally
      POSTGRES_PASSWORD: wally
      POSTGRES_DB: wally
    ports:
      - "5432:5432"
    volumes:
      - wally_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wally"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: wally-backend
    restart: always
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgres://wally:wally@db:5432/wally
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3333:3333"
    command: node ./dist/server.js

volumes:
  wally_pgdata:
