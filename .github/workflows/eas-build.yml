name: EAS Build (mobile)

# Mobile build through EAS. Manual (workflow_dispatch) so it does not burn quota
# on every push. Requires the EXPO_TOKEN secret to be set on the repository.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil do EAS (development | preview | production)'
        required: true
        default: preview

jobs:
  build:
    name: EAS build
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build
        working-directory: apps/mobile
        run: eas build --non-interactive --no-wait --platform all --profile ${{ github.event.inputs.profile }}
