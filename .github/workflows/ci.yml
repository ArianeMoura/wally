name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + Corepack (pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (API)
        run: pnpm --filter @wally/api lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
